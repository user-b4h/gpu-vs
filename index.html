<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA GPU 性能比較ツール (69モデル対応)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-bar { transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        select optgroup { background-color: #1e293b; color: #94a3b8; font-style: normal; }
        select option { background-color: #1e293b; color: #f1f5f9; }
        .hidden-result { display: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold mb-3 text-green-400">NVIDIA GPU 性能比較</h1>
            <p class="text-slate-400 text-sm">比較したい2つのGPUを選択してください</p>
        </header>

        <!-- Selector Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">GPU A (基準)</label>
                <select id="gpuSelectA" class="w-full bg-slate-700 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 outline-none cursor-pointer">
                    <option value="" disabled selected>GPUを選択してください</option>
                    <!-- Generated by JS -->
                </select>
            </div>
            <div class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">GPU B (比較対象)</label>
                <select id="gpuSelectB" class="w-full bg-slate-700 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                    <option value="" disabled selected>GPUを選択してください</option>
                    <!-- Generated by JS -->
                </select>
            </div>
        </div>

        <!-- Placeholder -->
        <div id="placeholder" class="bg-slate-800/50 p-12 rounded-2xl border-2 border-dashed border-slate-700 text-center text-slate-500">
            <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
            </svg>
            <p class="text-lg">GPUを2つ選択すると比較結果が表示されます</p>
        </div>

        <!-- Result Section (Initially Hidden) -->
        <div id="resultContainer" class="hidden-result space-y-6">
            <!-- Performance Chart -->
            <div class="bg-slate-800 p-6 md:p-8 rounded-2xl border border-slate-700 shadow-2xl">
                <h2 class="text-lg font-semibold mb-8 flex items-center">
                    <span class="w-1.5 h-5 bg-green-500 rounded mr-3"></span>
                    相対グラフィックス性能 (Time Spy 参考値)
                </h2>
                <div class="space-y-8">
                    <div class="relative">
                        <div class="flex justify-between items-end mb-2">
                            <span id="labelA" class="font-bold text-lg truncate pr-4">GPU A</span>
                            <span id="scoreA" class="text-green-400 font-mono text-xl">0</span>
                        </div>
                        <div class="w-full bg-slate-900 h-5 rounded-full p-1">
                            <div id="barA" class="chart-bar h-full bg-gradient-to-r from-green-600 to-green-400 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                    <div class="relative">
                        <div class="flex justify-between items-end mb-2">
                            <span id="labelB" class="font-bold text-lg truncate pr-4 text-blue-400">GPU B</span>
                            <span id="scoreB" class="text-blue-400 font-mono text-xl">0</span>
                        </div>
                        <div class="w-full bg-slate-900 h-5 rounded-full p-1">
                            <div id="barB" class="chart-bar h-full bg-gradient-to-r from-blue-600 to-blue-400 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div id="diffMsg" class="mt-10 p-6 bg-slate-900/50 rounded-xl text-center text-lg border border-slate-700"></div>
            </div>

            <!-- Spec Table -->
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-2xl">
                <table class="w-full text-sm md:text-base border-collapse">
                    <thead>
                        <tr class="bg-slate-700/30">
                            <th class="p-4 text-slate-500 font-medium text-left border-b border-slate-700">比較項目</th>
                            <th id="tableHeadA" class="p-4 font-bold text-green-400 text-center border-b border-slate-700 w-1/3">GPU A</th>
                            <th id="tableHeadB" class="p-4 font-bold text-blue-400 text-center border-b border-slate-700 w-1/3">GPU B</th>
                        </tr>
                    </thead>
                    <tbody id="specTableBody" class="divide-y divide-slate-700/50">
                        <!-- JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="mt-10 text-center text-slate-500 text-xs leading-relaxed max-w-2xl mx-auto">
            <p>※性能スコアは3DMark Time Spy Graphics Scoreに基づいた相対的な推定値です。</p>
            <p>※RTX 50シリーズおよび一部未発売モデルの仕様は予測値です。</p>
        </footer>
    </div>

    <script>
        const gpuGroups = {
            "GeForce RTX 50 Series": [
                { name: "GeForce RTX 5090", score: 47200, vram: "32GB GDDR7", tdp: "600W", arch: "Blackwell" },

                { name: "GeForce RTX 5070 Ti", score: 27800, vram: "16GB GDDR7", tdp: "300W", arch: "Blackwell" },

                { name: "GeForce RTX 5060", score: 13800, vram: "8GB GDDR7", tdp: "140W", arch: "Blackwell" },
                { name: "GeForce RTX 5050", score: 10200, vram: "8GB GDDR7", tdp: "115W", arch: "Blackwell" }
            ],
            "GeForce RTX 40 Series": [

                { name: "GeForce RTX 4080 SUPER", score: 29200, vram: "16GB GDDR6X", tdp: "320W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4080", score: 28400, vram: "16GB GDDR6X", tdp: "320W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4070 Ti SUPER", score: 24800, vram: "16GB GDDR6X", tdp: "285W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4070 Ti", score: 23200, vram: "12GB GDDR6X", tdp: "285W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4070 SUPER", score: 21200, vram: "12GB GDDR6X", tdp: "220W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4070", score: 18100, vram: "12GB GDDR6X", tdp: "200W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4060 Ti", score: 13600, vram: "8GB/16GB", tdp: "160W", arch: "Ada Lovelace" },
                { name: "GeForce RTX 4060", score: 10600, vram: "8GB GDDR6", tdp: "115W", arch: "Ada Lovelace" }
            ],
            "GeForce RTX 30 Series": [
                { name: "GeForce RTX 3090 Ti", score: 22100, vram: "24GB GDDR6X", tdp: "450W", arch: "Ampere" },
                { name: "GeForce RTX 3090", score: 20300, vram: "24GB GDDR6X", tdp: "350W", arch: "Ampere" },
                { name: "GeForce RTX 3080 Ti", score: 19800, vram: "12GB GDDR6X", tdp: "350W", arch: "Ampere" },
                { name: "GeForce RTX 3080", score: 17900, vram: "10GB GDDR6X", tdp: "320W", arch: "Ampere" },
                { name: "GeForce RTX 3070 Ti", score: 14900, vram: "8GB GDDR6X", tdp: "290W", arch: "Ampere" },
                { name: "GeForce RTX 3070", score: 13800, vram: "8GB GDDR6", tdp: "220W", arch: "Ampere" },
                { name: "GeForce RTX 3060 Ti", score: 11900, vram: "8GB GDDR6", tdp: "200W", arch: "Ampere" },
                { name: "GeForce RTX 3060", score: 8800, vram: "12GB GDDR6", tdp: "170W", arch: "Ampere" },
                { name: "GeForce RTX 3050", score: 6300, vram: "8GB GDDR6", tdp: "130W", arch: "Ampere" }
            ],
            "GeForce RTX 20 Series": [
                { name: "GeForce RTX 2080 Ti", score: 14700, vram: "11GB GDDR6", tdp: "250W", arch: "Turing" },
                { name: "GeForce RTX 2080 SUPER", score: 11700, vram: "8GB GDDR6", tdp: "250W", arch: "Turing" },
                { name: "GeForce RTX 2080", score: 11000, vram: "8GB GDDR6", tdp: "215W", arch: "Turing" },
                { name: "GeForce RTX 2070 SUPER", score: 10300, vram: "8GB GDDR6", tdp: "215W", arch: "Turing" },
                { name: "GeForce RTX 2070", score: 9200, vram: "8GB GDDR6", tdp: "175W", arch: "Turing" },
                { name: "GeForce RTX 2060 SUPER", score: 8900, vram: "8GB GDDR6", tdp: "175W", arch: "Turing" },
                { name: "GeForce RTX 2060", score: 7600, vram: "6GB GDDR6", tdp: "160W", arch: "Turing" }
            ],
            "GeForce GTX 16 Series": [
                { name: "GeForce GTX 1660 SUPER", score: 6100, vram: "6GB GDDR6", tdp: "125W", arch: "Turing" },
                { name: "GeForce GTX 1660 Ti", score: 6300, vram: "6GB GDDR6", tdp: "120W", arch: "Turing" },
                { name: "GeForce GTX 1660", score: 5500, vram: "6GB GDDR5", tdp: "120W", arch: "Turing" },
                { name: "GeForce GTX 1650 SUPER", score: 4800, vram: "4GB GDDR6", tdp: "100W", arch: "Turing" },
                { name: "GeForce GTX 1650", score: 3600, vram: "4GB GDDR5/6", tdp: "75W", arch: "Turing" },
                { name: "GeForce GTX 1630", score: 1400, vram: "4GB GDDR6", tdp: "75W", arch: "Turing" }
            ],
            "GeForce GTX 10 Series": [
                { name: "GeForce GTX 1080 Ti", score: 9800, vram: "11GB GDDR5X", tdp: "250W", arch: "Pascal" },
                { name: "GeForce GTX 1080", score: 7300, vram: "8GB GDDR5X", tdp: "180W", arch: "Pascal" },
                { name: "GeForce GTX 1070 Ti", score: 6900, vram: "8GB GDDR5", tdp: "180W", arch: "Pascal" },
                { name: "GeForce GTX 1070", score: 6100, vram: "8GB GDDR5", tdp: "150W", arch: "Pascal" },
                { name: "GeForce GTX 1060", score: 4400, vram: "6GB GDDR5", tdp: "120W", arch: "Pascal" },
                { name: "GeForce GTX 1050 Ti", score: 2500, vram: "4GB GDDR5", tdp: "75W", arch: "Pascal" },
                { name: "GeForce GTX 1050", score: 1900, vram: "2GB GDDR5", tdp: "75W", arch: "Pascal" }
            ],
            "GeForce GTX 900 Series": [
                { name: "GeForce GTX 980 Ti", score: 6000, vram: "6GB GDDR5", tdp: "250W", arch: "Maxwell" },
                { name: "GeForce GTX 980", score: 4600, vram: "4GB GDDR5", tdp: "165W", arch: "Maxwell" },
                { name: "GeForce GTX 970", score: 3800, vram: "4GB(3.5+0.5)", tdp: "145W", arch: "Maxwell" },
                { name: "GeForce GTX 960", score: 2400, vram: "2GB/4GB", tdp: "120W", arch: "Maxwell" },
                { name: "GeForce GTX 950", score: 1950, vram: "2GB GDDR5", tdp: "90W", arch: "Maxwell" }
            ],
            "GeForce GTX 700 Series": [
                { name: "GeForce GTX 780 Ti", score: 4100, vram: "3GB GDDR5", tdp: "250W", arch: "Kepler" },
                { name: "GeForce GTX 780", score: 3400, vram: "3GB GDDR5", tdp: "250W", arch: "Kepler" },
                { name: "GeForce GTX 770", score: 2800, vram: "2GB/4GB", tdp: "230W", arch: "Kepler" },
                { name: "GeForce GTX 760 Ti (OEM)", score: 2500, vram: "2GB GDDR5", tdp: "170W", arch: "Kepler" },
                { name: "GeForce GTX 760", score: 2200, vram: "2GB GDDR5", tdp: "170W", arch: "Kepler" },
                { name: "GeForce GTX 750 Ti", score: 1450, vram: "2GB GDDR5", tdp: "60W", arch: "Maxwell 1st" },
                { name: "GeForce GTX 750", score: 1250, vram: "1GB/2GB", tdp: "55W", arch: "Maxwell 1st" },
                { name: "GeForce GTX 745", score: 800, vram: "4GB DDR3", tdp: "55W", arch: "Maxwell 1st" }
            ],
            "GeForce GTX 600 Series": [
                { name: "GeForce GTX 690", score: 4500, vram: "4GB (2x2GB)", tdp: "300W", arch: "Kepler (Dual GPU)" },
                { name: "GeForce GTX 680", score: 3200, vram: "2GB/4GB", tdp: "195W", arch: "Kepler" },
                { name: "GeForce GTX 670", score: 2850, vram: "2GB/4GB", tdp: "170W", arch: "Kepler" },
                { name: "GeForce GTX 660 Ti", score: 2400, vram: "2GB GDDR5", tdp: "150W", arch: "Kepler" },
                { name: "GeForce GTX 660", score: 2050, vram: "2GB GDDR5", tdp: "140W", arch: "Kepler" },
                { name: "GeForce GTX 650 Ti BOOST", score: 1850, vram: "1GB/2GB", tdp: "134W", arch: "Kepler" },
                { name: "GeForce GTX 650 Ti", score: 1550, vram: "1GB/2GB", tdp: "110W", arch: "Kepler" },
                { name: "GeForce GTX 650", score: 1050, vram: "1GB/2GB", tdp: "64W", arch: "Kepler" },
                { name: "GeForce GTX 645", score: 700, vram: "1GB GDDR5", tdp: "64W", arch: "Kepler" }
            ]
        };

        const selectA = document.getElementById('gpuSelectA');
        const selectB = document.getElementById('gpuSelectB');
        const resContainer = document.getElementById('resultContainer');
        const placeholder = document.getElementById('placeholder');
        const flatList = [];

        function init() {
            Object.keys(gpuGroups).forEach(groupName => {
                const groupA = document.createElement('optgroup');
                const groupB = document.createElement('optgroup');
                groupA.label = groupB.label = groupName;

                gpuGroups[groupName].forEach(gpu => {
                    const id = flatList.length;
                    flatList.push(gpu);
                    groupA.appendChild(new Option(gpu.name, id));
                    groupB.appendChild(new Option(gpu.name, id));
                });

                selectA.appendChild(groupA);
                selectB.appendChild(groupB);
            });
        }

        function update() {
            if (selectA.value === "" || selectB.value === "") return;

            placeholder.style.display = 'none';
            resContainer.classList.remove('hidden-result');

            const gpuA = flatList[selectA.value];
            const gpuB = flatList[selectB.value];
            const maxScoreValue = 47200; 

            // Text Update
            document.getElementById('labelA').textContent = gpuA.name;
            document.getElementById('labelB').textContent = gpuB.name;
            document.getElementById('scoreA').textContent = gpuA.score.toLocaleString();
            document.getElementById('scoreB').textContent = gpuB.score.toLocaleString();
            document.getElementById('tableHeadA').textContent = gpuA.name;
            document.getElementById('tableHeadB').textContent = gpuB.name;

            // Chart Update
            document.getElementById('barA').style.width = (gpuA.score / maxScoreValue * 100) + "%";
            document.getElementById('barB').style.width = (gpuB.score / maxScoreValue * 100) + "%";

            // Comparison Text
            const ratio = (gpuB.score / gpuA.score);
            if (ratio >= 1) {
                const times = ratio.toFixed(1);
                const percent = Math.round((ratio - 1) * 100);
                document.getElementById('diffMsg').innerHTML = `
                    <div class="text-sm text-slate-400 mb-2">比較結果</div>
                    <div>
                        <span class="text-blue-400 font-bold">${gpuB.name}</span> は 
                        <span class="text-green-400 font-bold">${gpuA.name}</span> より<br class="md:hidden">
                        約 <span class="text-white text-3xl font-black mx-1">${times}</span> 倍 
                        (<span class="text-green-400 font-bold">${percent}%</span>) 高性能です
                    </div>
                `;
            } else {
                const percent = Math.round(ratio * 100);
                document.getElementById('diffMsg').innerHTML = `
                    <div class="text-sm text-slate-400 mb-2">比較結果</div>
                    <div>
                        <span class="text-blue-400 font-bold">${gpuB.name}</span> の性能は 
                        <span class="text-green-400 font-bold">${gpuA.name}</span> の<br class="md:hidden">
                        約 <span class="text-white text-3xl font-black mx-1">${percent}%</span> に相当します
                    </div>
                `;
            }

            // Spec Table
            const fields = [
                { label: "アーキテクチャ", key: "arch" },
                { label: "ビデオメモリ", key: "vram" },
                { label: "消費電力 (TDP)", key: "tdp" }
            ];

            document.getElementById('specTableBody').innerHTML = fields.map(f => `
                <tr class="hover:bg-slate-700/20 transition-colors">
                    <td class="p-4 text-slate-400 font-medium">${f.label}</td>
                    <td class="p-4 text-center text-slate-200">${gpuA[f.key]}</td>
                    <td class="p-4 text-center text-slate-200">${gpuB[f.key]}</td>
                </tr>
            `).join('');
        }

        selectA.addEventListener('change', update);
        selectB.addEventListener('change', update);

        init();
    </script>
</body>
</html>
